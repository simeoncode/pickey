name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: rust

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/pickey pickey-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: pickey-${{ matrix.target }}
          path: pickey-${{ matrix.target }}

  upload:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect binaries
        run: |
          mkdir -p dist
          mv pickey-*/pickey-* dist/
          (cd dist && shasum -a 256 pickey-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  update-homebrew:
    needs: [release-please, upload]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Collect checksums
        run: |
          mkdir -p dist
          mv pickey-*/pickey-* dist/
          (cd dist && shasum -a 256 pickey-* > SHA256SUMS)

      - name: Render formula
        run: |
          version="${{ needs.release-please.outputs.tag_name }}"
          version="${version#v}"
          packaging/homebrew/render-formula.sh \
            "$version" \
            dist/SHA256SUMS \
            packaging/homebrew/Formula/pickey.rb

      - name: Check tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update simeoncode/homebrew-tap" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: simeoncode/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Commit formula to tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/Formula/pickey.rb homebrew-tap/Formula/pickey.rb
          cd homebrew-tap
          if git diff --quiet -- Formula/pickey.rb; then
            echo "Formula is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pickey.rb
          git commit -m "pickey ${{ needs.release-please.outputs.tag_name }}"
          git push

  publish-crate:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is required to publish to crates.io" >&2
            exit 1
          fi
          version="$(cargo pkgid | sed 's/.*#//')"
          status="$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/pickey/$version")"
          if [ "$status" = "200" ]; then
            echo "pickey $version is already published on crates.io"
            exit 0
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected crates.io status for pickey $version: $status" >&2
            exit 1
          fi
          cargo publish --locked
